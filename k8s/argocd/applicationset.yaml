apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: python-apps
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - env: dev
            namespace: dev
            appName: python-appset-dev
            releaseName: python-appset-dev
            valueFile: values-dev.yaml
            autoSync: true
          - env: prod
            namespace: prod
            appName: python-appset-prod
            releaseName: python-appset-prod
            valueFile: values-prod.yaml
            autoSync: false
  template:
    metadata:
      name: '{{ .appName }}'
    spec:
      project: default
      source:
        repoURL: https://github.com/kvllad/DevOps-Core-Course.git
        targetRevision: lab13
        path: k8s/devops-python
        helm:
          releaseName: '{{ .releaseName }}'
          valueFiles:
            - '{{ .valueFile }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .namespace }}'
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
  templatePatch: |
    {{- if .autoSync }}
    spec:
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
    {{- end }}
