apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "common.fullname" . }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "common.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "common.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- if or .Values.vault.enabled .Values.podAnnotations .Values.configMaps.file.enabled .Values.configMaps.env.enabled }}
      annotations:
        {{- if or .Values.configMaps.file.enabled .Values.configMaps.env.enabled }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- end }}
        {{- if .Values.vault.enabled }}
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: {{ .Values.vault.role | quote }}
        vault.hashicorp.com/agent-inject-secret-{{ .Values.vault.renderFile }}: {{ .Values.vault.secretPath | quote }}
        vault.hashicorp.com/agent-inject-template-{{ .Values.vault.renderFile }}: |
          {{- include "devops-python.vaultEnvTemplate" . | nindent 10 }}
        vault.hashicorp.com/agent-inject-command-{{ .Values.vault.renderFile }}: {{ .Values.vault.command | quote }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "devops-python.serviceAccountName" . }}
      automountServiceAccountToken: {{ ternary true .Values.serviceAccount.automount .Values.vault.enabled }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ include "common.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          {{- if or .Values.configMaps.file.enabled .Values.persistence.enabled }}
          volumeMounts:
            {{- if .Values.configMaps.file.enabled }}
            - name: config-volume
              mountPath: {{ .Values.configMaps.file.mountPath }}
              readOnly: true
            {{- end }}
            {{- if .Values.persistence.enabled }}
            - name: data-volume
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
          {{- end }}
          env:
            {{- include "devops-python.envVars" . | nindent 12 }}
          {{- if or .Values.configMaps.env.enabled .Values.secrets.enabled }}
          envFrom:
            {{- if .Values.configMaps.env.enabled }}
            - configMapRef:
                name: {{ include "devops-python.envConfigMapName" . }}
            {{- end }}
            {{- if .Values.secrets.enabled }}
            - secretRef:
                name: {{ include "devops-python.secretName" . }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.probes.startup.enabled }}
          startupProbe:
            {{- toYaml (omit .Values.probes.startup "enabled") | nindent 12 }}
          {{- end }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            {{- toYaml (omit .Values.probes.liveness "enabled") | nindent 12 }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            {{- toYaml (omit .Values.probes.readiness "enabled") | nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
      {{- if or .Values.configMaps.file.enabled .Values.persistence.enabled }}
      volumes:
        {{- if .Values.configMaps.file.enabled }}
        - name: config-volume
          configMap:
            name: {{ include "devops-python.configMapName" . }}
        {{- end }}
        {{- if .Values.persistence.enabled }}
        - name: data-volume
          persistentVolumeClaim:
            claimName: {{ include "devops-python.pvcName" . }}
        {{- end }}
      {{- end }}
