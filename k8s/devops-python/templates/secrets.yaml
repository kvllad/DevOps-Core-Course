{{- if .Values.secrets.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "devops-python.secretName" . }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
type: {{ .Values.secrets.type }}
stringData:
  {{- range $key, $value := .Values.secrets.data }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
