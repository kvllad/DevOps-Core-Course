{{- if and .Values.rollout.enabled (not .Values.statefulset.enabled) }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "common.fullname" . }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      {{- include "common.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "common.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- include "devops-python.podAnnotations" . | nindent 6 }}
    spec:
      serviceAccountName: {{ include "devops-python.serviceAccountName" . }}
      automountServiceAccountToken: {{ ternary true .Values.serviceAccount.automount .Values.vault.enabled }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- include "devops-python.initContainers" . | nindent 6 }}
      containers:
        - name: {{ include "common.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          {{- include "devops-python.volumeMounts" . | nindent 10 }}
          env:
            {{- include "devops-python.envVars" . | nindent 12 }}
          {{- if or .Values.configMaps.env.enabled .Values.secrets.enabled }}
          envFrom:
            {{- if .Values.configMaps.env.enabled }}
            - configMapRef:
                name: {{ include "devops-python.envConfigMapName" . }}
            {{- end }}
            {{- if .Values.secrets.enabled }}
            - secretRef:
                name: {{ include "devops-python.secretName" . }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.probes.startup.enabled }}
          startupProbe:
            {{- toYaml (omit .Values.probes.startup "enabled") | nindent 12 }}
          {{- end }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            {{- toYaml (omit .Values.probes.liveness "enabled") | nindent 12 }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            {{- toYaml (omit .Values.probes.readiness "enabled") | nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
      {{- include "devops-python.workloadVolumes" . | nindent 6 }}
  strategy:
    {{- if eq .Values.rollout.strategy "blueGreen" }}
    blueGreen:
      activeService: {{ include "common.fullname" . }}
      previewService: {{ include "devops-python.previewServiceName" . }}
      autoPromotionEnabled: {{ .Values.rollout.blueGreen.autoPromotionEnabled }}
    {{- else }}
    canary:
      maxSurge: {{ .Values.rollout.canary.maxSurge }}
      maxUnavailable: {{ .Values.rollout.canary.maxUnavailable }}
      steps:
        - setWeight: 20
        - pause: {}
        {{- if .Values.rollout.analysis.enabled }}
        - analysis:
            templates:
              - templateName: {{ include "devops-python.analysisTemplateName" . }}
        {{- end }}
        - setWeight: 40
        - pause:
            duration: 30s
        - setWeight: 60
        - pause:
            duration: 30s
        - setWeight: 80
        - pause:
            duration: 30s
        - setWeight: 100
    {{- end }}
{{- end }}
