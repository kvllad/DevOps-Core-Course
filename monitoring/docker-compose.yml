version: "3.8"

x-default-resources: &default-resources
  deploy:
    resources:
      limits:
        cpus: "1.0"
        memory: 1G
      reservations:
        cpus: "0.25"
        memory: 256M

services:
  loki:
    image: grafana/loki:3.0.0
    command:
      - -config.file=/etc/loki/config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    labels:
      logging: "promtail"
      app: "observability-loki"
    networks:
      - logging
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    <<: *default-resources

  promtail:
    image: grafana/promtail:3.0.0
    command:
      - -config.file=/etc/promtail/config.yml
    ports:
      - "9080:9080"
    depends_on:
      loki:
        condition: service_healthy
    volumes:
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
      - promtail-positions:/tmp
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    labels:
      logging: "promtail"
      app: "observability-promtail"
    networks:
      - logging
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/9080; printf \"GET /ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; grep -q \"200\" <&3' || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    <<: *default-resources

  grafana:
    image: grafana/grafana:12.3.1
    env_file:
      - .env
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD}"
    ports:
      - "3000:3000"
    depends_on:
      loki:
        condition: service_healthy
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    labels:
      logging: "promtail"
      app: "observability-grafana"
    networks:
      - logging
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    <<: *default-resources

  app-python:
    build:
      context: ../app_python
    image: devops-course/devops-python:lab07
    environment:
      PORT: "8000"
      HOST: "0.0.0.0"
      DEBUG: "false"
    ports:
      - "8000:8000"
    labels:
      logging: "promtail"
      app: "devops-python"
    networks:
      - logging
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\" || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    <<: *default-resources

  app-go:
    build:
      context: ../app_go
    image: devops-course/devops-go:lab07
    environment:
      PORT: "8080"
      HOST: "0.0.0.0"
    ports:
      - "8001:8080"
    labels:
      logging: "promtail"
      app: "devops-go"
    networks:
      - logging
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    <<: *default-resources

volumes:
  loki-data:
  grafana-data:
  promtail-positions:

networks:
  logging:
    driver: bridge
