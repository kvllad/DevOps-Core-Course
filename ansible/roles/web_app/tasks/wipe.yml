---
- name: Wipe web application deployment
  block:
    - name: Stop and remove compose project
      community.docker.docker_compose_v2:
        project_src: "{{ compose_project_dir }}"
        state: absent
        remove_orphans: true
        remove_images: local
      ignore_errors: true

    - name: Remove rendered docker compose file
      ansible.builtin.file:
        path: "{{ compose_project_dir }}/docker-compose.yml"
        state: absent

    - name: Remove application directory
      ansible.builtin.file:
        path: "{{ compose_project_dir }}"
        state: absent

    - name: Log wipe completion
      ansible.builtin.debug:
        msg: "Application {{ app_name }} wiped successfully."

  # Double safety: the tasks are selected by tag and still blocked unless the variable is true.
  when: web_app_wipe | bool
  tags:
    - web_app_wipe
