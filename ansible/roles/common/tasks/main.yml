---
- name: Install common system packages
  become: true
  tags:
    - common
    - packages
  block:
    - name: Refresh apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install common packages
      ansible.builtin.apt:
        name: "{{ common_packages }}"
        state: present

  rescue:
    - name: Repair apt metadata after failed cache refresh
      ansible.builtin.apt:
        update_cache: true
        force_apt_get: true
      changed_when: true

    - name: Retry package installation after repair
      ansible.builtin.apt:
        name: "{{ common_packages }}"
        state: present
        update_cache: true

  always:
    - name: Write common package block completion log
      ansible.builtin.copy:
        dest: /tmp/ansible-common-packages.log
        content: "common/packages finished at {{ ansible_date_time.iso8601 }}\n"
        mode: "0644"

- name: Ensure operator user exists
  become: true
  tags:
    - common
    - users
  block:
    - name: Create operator group memberships
      ansible.builtin.user:
        name: "{{ app_admin_user }}"
        shell: /bin/bash
        groups: "{{ app_admin_groups | join(',') }}"
        append: true
        create_home: true

    - name: Ensure operator .ssh directory exists
      ansible.builtin.file:
        path: "/home/{{ app_admin_user }}/.ssh"
        state: directory
        owner: "{{ app_admin_user }}"
        group: "{{ app_admin_user }}"
        mode: "0700"

  rescue:
    - name: Report operator provisioning failure
      ansible.builtin.debug:
        msg: "User management block failed for {{ app_admin_user }}."

  always:
    - name: Write common user block completion log
      ansible.builtin.copy:
        dest: /tmp/ansible-common-users.log
        content: "common/users finished at {{ ansible_date_time.iso8601 }}\n"
        mode: "0644"
