---
- name: Log in to Docker Hub
  community.docker.docker_login:
    registry_url: https://index.docker.io/v1/
    username: "{{ dockerhub_username }}"
    password: "{{ dockerhub_password }}"
  no_log: true

- name: Pull application image
  community.docker.docker_image:
    name: "{{ docker_image }}"
    tag: "{{ docker_image_tag }}"
    source: pull

- name: Remove previous application container if present
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    state: absent

- name: Run application container
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    image: "{{ docker_image }}:{{ docker_image_tag }}"
    state: started
    restart_policy: "{{ app_restart_policy }}"
    recreate: true
    pull: never
    ports:
      - "{{ app_port }}:{{ app_container_port }}"
    env: "{{ app_env }}"
  notify: restart application container

- name: Wait for application port
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ app_port | int }}"
    timeout: 60
    delay: 2

- name: Verify health endpoint
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ app_port }}{{ app_healthcheck_path }}"
    method: GET
    status_code: 200
  register: healthcheck_result
  retries: "{{ app_healthcheck_retries | int }}"
  delay: "{{ app_healthcheck_delay | int }}"
  until: healthcheck_result.status == 200
