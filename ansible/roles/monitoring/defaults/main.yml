---
monitoring_dir: /opt/monitoring

monitoring_loki_version: "3.0.0"
monitoring_promtail_version: "3.0.0"
monitoring_grafana_version: "12.3.1"
prometheus_version: "3.9.0"

monitoring_loki_port: 3100
monitoring_promtail_port: 9080
monitoring_grafana_port: 3000
prometheus_port: 9090
monitoring_retention_period: 168h
monitoring_schema_version: v13
prometheus_retention_days: 15
prometheus_retention_size: "10GB"
prometheus_scrape_interval: "15s"

prometheus_targets:
  - job: prometheus
    targets:
      - "localhost:9090"
  - job: loki
    targets:
      - "loki:3100"
  - job: grafana
    targets:
      - "grafana:3000"
  - job: app
    targets:
      - "app-python:8000"
    path: "/metrics"

monitoring_grafana_admin_user: admin
monitoring_grafana_admin_password: change-me-monitoring

monitoring_python_app_name: devops-python
monitoring_python_app_image: vladkuznetsov/devops-info-service:latest
monitoring_python_app_port: 8000
monitoring_python_app_internal_port: 8000

monitoring_go_app_name: devops-go
monitoring_go_app_image: vladkuznetsov/devops-info-service-go:latest
monitoring_go_app_port: 8001
monitoring_go_app_internal_port: 8080

monitoring_loki_memory_limit: 1G
monitoring_promtail_memory_limit: 512M
monitoring_prometheus_memory_limit: 1G
monitoring_grafana_memory_limit: 512M
monitoring_app_memory_limit: 256M

monitoring_loki_cpu_limit: "1.0"
monitoring_promtail_cpu_limit: "0.5"
monitoring_prometheus_cpu_limit: "1.0"
monitoring_grafana_cpu_limit: "0.5"
monitoring_app_cpu_limit: "0.5"
