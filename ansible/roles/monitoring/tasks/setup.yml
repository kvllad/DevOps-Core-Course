---
- name: Create monitoring directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ monitoring_dir }}"
    - "{{ monitoring_dir }}/loki"
    - "{{ monitoring_dir }}/promtail"
    - "{{ monitoring_dir }}/grafana"
    - "{{ monitoring_dir }}/grafana/provisioning"
    - "{{ monitoring_dir }}/grafana/provisioning/datasources"
    - "{{ monitoring_dir }}/grafana/provisioning/dashboards"
    - "{{ monitoring_dir }}/grafana/dashboards"

- name: Render monitoring stack templates
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: "{{ item.mode | default('0644') }}"
  loop:
    - src: docker-compose.yml.j2
      dest: "{{ monitoring_dir }}/docker-compose.yml"
    - src: loki-config.yml.j2
      dest: "{{ monitoring_dir }}/loki/config.yml"
    - src: promtail-config.yml.j2
      dest: "{{ monitoring_dir }}/promtail/config.yml"
    - src: grafana-datasource.yml.j2
      dest: "{{ monitoring_dir }}/grafana/provisioning/datasources/loki.yml"
    - src: grafana-dashboard-provider.yml.j2
      dest: "{{ monitoring_dir }}/grafana/provisioning/dashboards/dashboard-provider.yml"
    - src: grafana-logs-dashboard.json.j2
      dest: "{{ monitoring_dir }}/grafana/dashboards/lab07-logs-dashboard.json"
    - src: monitoring.env.j2
      dest: "{{ monitoring_dir }}/.env"
      mode: "0600"
